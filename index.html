<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcSQL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          fontFamily: {
            sans:    ['"Inter Variable"', 'Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono:    ['"Martian Mono"', '"JetBrains Mono"', 'ui-monospace', 'monospace'],
            display: ['"Martian Grotesk"', 'ui-sans-serif', 'sans-serif'],
          },
          colors: {
            /* ── Agentic Labs — AgentPrism Figma palette (exact hex) ── */

            /* Surface stack — slate scale */
            agl: {
              bg:       '#020618',   /* slate-950 */
              surface:  '#0f172b',   /* slate-900 */
              surface2: '#1d293d',   /* slate-800 */
              border:   '#1e2d42',
              fg:       '#f1f5f9',   /* slate-100 */
              muted:    '#90a1b9',   /* slate-400 */
              subtle:   '#62748e',   /* slate-500 */
              accent:   '#51a2ff',   /* blue-400 */
            },

            /* Agent-prism trace categories — all at same lightness */
            cat: {
              llm:          '#8e51ff',   /* violet-500  */
              agent:        '#2b7fff',   /* blue-500    */
              tool:         '#ff6900',   /* orange-500  */
              chain:        '#00bba7',   /* teal-500    */
              retrieval:    '#00b8db',   /* cyan-500    */
              embedding:    '#00c951',   /* green-600   */
              guardrail:    '#fb2c36',   /* red-500     */
              'create-agent': '#00a6f4', /* sky-500     */
              unknown:      '#62748e',   /* slate-500   */
            },

            /* Status */
            status: {
              success: '#05df72',
              warning: '#ffba00',
              error:   '#ff6467',
              pending: '#a684ff',
            },

            /* Legacy aliases — maps old names to Agentic Labs values */
            martian: {
              bg:      '#020618',
              surface: '#0f172b',
              subtle:  '#1d293d',
              border:  '#1e2d42',
              text:    '#f1f5f9',
              muted:   '#90a1b9',
              primary: '#51a2ff',
            },
            omop: {
              cyan:    '#00b8db',
              magenta: '#8e51ff',
              amber:   '#fd9a00',
              emerald: '#00c951',
              indigo:  '#615fff',
              slate:   '#62748e',
            },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
